services:
  # Nginx Proxy
  nginx:
    image: nginx:alpine
    container_name: aicms_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
      mcp_server:
        condition: service_started
    restart: unless-stopped

  # Frontend - Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: aicms_frontend
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    command: pnpm dev

  # Backend - FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: aicms_backend
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://aicms:aicms_password@postgres:5432/aicms
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRATION_MINUTES=${JWT_EXPIRATION_MINUTES:-30}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8000}
      - DOMAIN=${DOMAIN:-aicms.docmet.systems}
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@mystorey.io}
      - SMTP_TLS=${SMTP_TLS:-false}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID:-}
      - STRIPE_AGENCY_PRICE_ID=${STRIPE_AGENCY_PRICE_ID:-}
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --timeout-graceful-shutdown 3

  # MCP Server - for AI tool integration
  mcp_server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    container_name: aicms_mcp_server
    environment:
      - PYTHONUNBUFFERED=1
      - API_URL=http://backend:8000/api
      - APP_URL=http://localhost
      - DATABASE_URL=postgresql+asyncpg://aicms:aicms_password@postgres:5432/aicms
    volumes:
      - ./mcp_server:/app
      - /app/.venv
    ports:
      - "8001:8000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # Mail - Mailpit (local email testing)
  mailpit:
    image: axllent/mailpit:latest
    container_name: aicms_mailpit
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    restart: unless-stopped

  # Database - PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: aicms_postgres
    environment:
      - POSTGRES_USER=aicms
      - POSTGRES_PASSWORD=aicms_password
      - POSTGRES_DB=aicms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicms -d aicms"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
