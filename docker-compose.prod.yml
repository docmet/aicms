services:
  # Nginx reverse proxy (handles SSL termination via Coolify/Traefik in front)
  nginx:
    image: nginx:alpine
    container_name: aicms_nginx
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
      mcp_server:
        condition: service_started
    restart: unless-stopped

  # Frontend — Next.js (standalone production build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: aicms_frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # Backend — FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: aicms_backend
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://aicms:${POSTGRES_PASSWORD}@postgres:5432/aicms
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRATION_MINUTES=${JWT_EXPIRATION_MINUTES:-60}
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}
      - DOMAIN=${DOMAIN}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # MCP Server — hosted AI tool integration
  mcp_server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    container_name: aicms_mcp_server
    environment:
      - PYTHONUNBUFFERED=1
      - API_URL=http://backend:8000/api
      - APP_URL=https://${DOMAIN}
      - DATABASE_URL=postgresql+asyncpg://aicms:${POSTGRES_PASSWORD}@postgres:5432/aicms
      - DOMAIN=${DOMAIN}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # Database — PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: aicms_postgres
    environment:
      - POSTGRES_USER=aicms
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=aicms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicms -d aicms"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
